      Verifying the tensor does not collapse for exact polar, and does not reduce to a scalar
      blend, BEFORE coding avoids wasting a benchmark slot.
    context: >
      Multiple ideas (GLC001, NMA001, DPF001, CPD001, ITP001, PJD001, BPD001) were killed
      pre-code purely on this algebra by the refined-rule/novelty gates.
