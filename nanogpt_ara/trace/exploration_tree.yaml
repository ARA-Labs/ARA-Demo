# Exploration tree — Codex track_3_optimization speedrun
# Root = the mission question; waves nest as children; experiments, decisions, and dead_ends
# are typed nodes. The novelty wave is an isolated NV## subtree, read-scoped off the lineage.
# support_level: explicit (in the inputs, with source_refs) | inferred (reconstructed).
# evidence: entries are claim IDs (C##) from logic/claims.md.

root:
  id: M0
  type: question
  question: "In how few one-fwd-bwd steps can a fixed 124M-GPT reach 3.28 val loss, changing only optimizer/schedule/init?"
  support_level: explicit
  source_refs: ["v1/codex/goal.md:3-8", "v1/codex/AGENTS.md:3-6"]
  children:

    # ===================== WAVE v1 =====================
    - id: V1
      type: question
      question: "Which post-Muon optimizer/schedule/init combination beats Muon at 3500 steps?"
      support_level: explicit
      source_refs: ["v1/codex/scratchpad/THREAD.md:10-60"]
      children:
        - id: V1-D1
          type: decision
          decision: "Order the search conservatively: schedule/LR-floor and EMA before heavy optimizer replacements, because the baseline is already near target at 3375."
          support_level: explicit
          source_refs: ["v1/codex/scratchpad/THREAD.md:51-54"]
        - id: V1-E1
          type: experiment
          experiment: "Schedule-horizon vs train-step decoupling (horizon<sched>-stop<train>)."
          outcome: "First sub-3500 hit at step 3450, reproduced on seed 1 — the core compression lever."
          support_level: explicit
          source_refs: ["v1/codex/scratchpad/THREAD.md:142-198"]
          evidence: ["C01"]
        - id: V1-E2
          type: experiment
          experiment: "Optimizer-family screen vs the 3500-step Muon bar (NorMuon, Muon2F, Adam-mini, and dozens more)."
          outcome: "NorMuon, Muon2F, Adam-mini survive; most families ruled out as clean negatives."
          support_level: explicit
          source_refs: ["v1/codex/plan.md:35-71", "v1/codex/scratchpad/THREAD.md:253-1620"]
          evidence: ["C03", "C05"]
          children:
            - id: V1-DE1
              type: dead_end
              dead_end: "Cautious-Muon / sign-mask updates: degrade the early curve (final 3.30833, no crossing)."
              support_level: explicit
              source_refs: ["v1/codex/scratchpad/THREAD.md:93"]
            - id: V1-DE2
              type: dead_end
              dead_end: "MARS-M (all gammas), FWA, SOAP/Shampoo full, APOLLO, Lookahead-NorMuon, Sophia-F, RAdamW, SWATS, NovoGrad: rejected at early/mid gates."
              support_level: explicit
              source_refs: ["v1/codex/scratchpad/THREAD.md:221-222", "v1/codex/scratchpad/THREAD.md:245-251", "v1/codex/plan.md:56-71"]
            - id: V1-DE3
              type: dead_end
              dead_end: "Residual-projection small-init / tied-head / semi-orthogonal init family: no broad gain; do not stack with Muon2F."
              support_level: explicit
              source_refs: ["v1/codex/scratchpad/THREAD.md:1732-1736", "v1/codex/plan.md:55"]
        - id: V1-E3
          type: experiment
          experiment: "Endpoint smoothing — tail-EMA (beta 0.99, late start) vs uniform SWA."
          outcome: "Tail-EMA is the strongest endpoint lever; SWA consistently worse."
          support_level: explicit
          source_refs: ["v1/codex/scratchpad/THREAD.md:1806-1813"]
          evidence: ["C02"]
        - id: V1-D2
          type: decision
          decision: "Prefer the isolated mu-schedule lever over stacked v12 packages (packages miss late despite mid-curve gains)."
          support_level: explicit
          source_refs: ["v1/codex/plan.md:12", "v1/codex/scratchpad/THREAD.md:2202-2208"]
          evidence: ["C07"]
        - id: V1-E4
          type: experiment
          experiment: "Leave-one-out pruning of the v12iso stack at the 3195 screen, then statistical-relevance pass."
          outcome: "Tail-EMA and Muon2F dominate; late-LR/pulse/mom-refresh net-removable. Stat pass rejects s3170; submitted record bin = 3205 (n=16)."
          support_level: explicit
          source_refs: ["v1/codex/scratchpad/THREAD.md:2170-2232", "record_configs/20260515_codex_v1_v12iso_3205/README.md:13-26"]
          evidence: ["C06", "C07"]
          children:
            - id: V1-DE4
              type: dead_end
              dead_end: "s3170 single-seed floor: rejected by the significance gate (negative score at n=15)."
              support_level: explicit
              source_refs: ["v1/codex/scratchpad/THREAD.md:2232"]
              evidence: ["C05", "C06"]

    # ===================== WAVE novelty (ISOLATED NV subtree) =====================
    - id: NV
      type: question
      question: "Can genuinely-novel mechanisms (hard-isolated, no other-worktree access) beat Muon at 3500?"
      isolated: true
      support_level: explicit
      source_refs: ["novelty/codex/scratchpad/THREAD.md:10-36"]
      children:
        - id: NV-D1
          type: decision
          decision: "Two mandatory pre-code gates (arXiv novelty + benchmark-rule compliance); novelty bar tightened three times to exclude schedule, then optimizer+schedule, then merely-additive couplings."
          support_level: explicit
          source_refs: ["novelty/codex/scratchpad/THREAD.md:130-134", "novelty/codex/scratchpad/THREAD.md:248-253", "novelty/codex/scratchpad/THREAD.md:455-457"]
          evidence: ["C12"]
        - id: NV-E1
          type: experiment
          experiment: "~3 dozen novel mechanisms benchmarked (TRM/STM/ALR, RSI/VFG/NGI init, PDS/CMU/GMS/BIGE/DPS couplings)."
          outcome: "Best robust result = a reproduced 25-step (one-bin) gain, explicitly below the noise floor. No promotable submission."
          support_level: explicit
          source_refs: ["novelty/codex/scratchpad/THREAD.md:577-580"]
          evidence: ["C05", "C12"]
          children:
            - id: NV-DE1
              type: dead_end
              dead_end: "Single-seed crossings (NGI 3475, NDF 3375) fail second-seed reproduction."
              support_level: explicit
              source_refs: ["novelty/codex/scratchpad/THREAD.md:574-575", "novelty/codex/scratchpad/THREAD.md:1340-1342"]
              evidence: ["C05"]
            - id: NV-DE2
              type: dead_end
              dead_end: "Many couplings killed before code: reduce to known Muon literature (Muon2/OrthoGrad/GaLore/Cayley) or are exact-polar algebraic no-ops (UtU=I)."
              support_level: explicit
              source_refs: ["novelty/codex/scratchpad/THREAD.md:1214", "novelty/codex/scratchpad/THREAD.md:1855-1856"]
              evidence: ["C12"]

    # ===================== WAVE v2 =====================
    - id: V2
      type: question
      question: "Can the v12 optimizer stack be pushed below 3000 steps while staying compliant?"
      support_level: explicit
      source_refs: ["v2/codex/scratchpad/THREAD.md:3-22"]
      also_depends_on: ["V1-E4"]
      children:
        - id: V2-D1
          type: decision
          decision: "Use the inherited cc v12 parent (the only known 3025-step parent) as the v2 backbone, provisionally."
          support_level: explicit
          source_refs: ["v2/codex/scratchpad/THREAD.md:6"]
        - id: V2-DE1
          type: dead_end
          dead_end: "All v12-derived results QUARANTINED: the inherited RMSNorm.forward / q-k-norm change is a forward-path violation, invalid even though it materially helped."
          support_level: explicit
          source_refs: ["v2/codex/scratchpad/THREAD.md:126-128", "v2/codex/scratchpad/THREAD.md:154"]
          evidence: ["C08"]
        - id: V2-D2
          type: decision
          decision: "Rebuild a byte-identical-compliant legal_v12opt family from the workspace baseline; switch prefix v2cx -> v2cxleg; add a launch-time Architecture gate."
          support_level: explicit
          source_refs: ["v2/codex/scratchpad/THREAD.md:130-134"]
          evidence: ["C08"]
        - id: V2-E1
          type: experiment
          experiment: "Role-specific LR (RoleLR2) + role-specific WD (RoleWD) + Muon lookahead frontier walk on the compliant stack."
          outcome: "Single-seed frontier reached 2962/2963, but those cohorts' means miss 3.28."
          support_level: explicit
          source_refs: ["v2/codex/scratchpad/THREAD.md:476-800"]
          evidence: ["C04", "C05"]
        - id: V2-E2
          type: experiment
          experiment: "Fixed-cohort significance verification (+25/+50/+75) and v2 leave-one-out pruning at 3037."
          outcome: "Low-step families fail (3.28-mu)*sqrt(n)>=0.004; the fixed ts3037 cohort passes as the earliest common checkpoint. Submitted bin = 3037 (n=16)."
          support_level: explicit
          source_refs: ["v2/codex/scratchpad/THREAD.md:802-810", "record_configs/20260515_codex_v2_legal_3037/README.md:13-26"]
          evidence: ["C03", "C04", "C06"]
          children:
            - id: V2-DE2
              type: dead_end
              dead_end: "ts2961 (0/64) and the 2962/2963/2970/2982 cohorts: rejected by the significance gate (negative cohort scores)."
              support_level: explicit
              source_refs: ["v2/codex/scratchpad/THREAD.md:800-802"]
              evidence: ["C05", "C06"]

    # ===================== WAVE v3 =====================
    - id: V3
      type: question
      question: "Can the public radial/Soft-Muon frontier be reproduced and compressed below 2950 steps?"
      support_level: explicit
      source_refs: ["v3/codex/scratchpad/THREAD.md:411-442"]
      also_depends_on: ["V2-E2"]
      children:
        - id: V3-D1
          type: decision
          decision: "Pivot from the internal Aurora lineage to the public PR frontier (PR #291 Soft-Muon, PR #294 radial) as a stronger parent; reproduce the v48 public-frontier parent first, then compress."
          support_level: explicit
          source_refs: ["v3/codex/scratchpad/THREAD.md:411", "v3/codex/scratchpad/THREAD.md:552"]
          evidence: ["C09", "C10"]
        - id: V3-E1
          type: experiment
          experiment: "Reproduce public PRs: radial timing (tail-only vs step-zero), Soft-Muon, SOAP portability."
          outcome: "Tail-only PR #294 radial and PR #291 Soft-Muon reproduce and are load-bearing; full KL-SOAP-H not portable (zero-init freeze); Muown incompatible."
          support_level: explicit
          source_refs: ["v3/codex/scratchpad/THREAD.md:414", "v3/codex/scratchpad/THREAD.md:424", "v3/codex/scratchpad/THREAD.md:439"]
          evidence: ["C09", "C10"]
          children:
            - id: V3-DE1
              type: dead_end
              dead_end: "Radial-from-step-zero: a kill (under-2950 cannot recover from a ~0.04 early loss)."
              support_level: explicit
              source_refs: ["v3/codex/scratchpad/THREAD.md:414"]
              evidence: ["C09"]
            - id: V3-DE2
              type: dead_end
              dead_end: "PR #290 full KL-SOAP-H and PR #288 Muown: not portable to this backbone; salvaged only as a warm-start SOAP-skip sidecar."
              support_level: explicit
              source_refs: ["v3/codex/scratchpad/THREAD.md:424", "v3/codex/scratchpad/THREAD.md:439"]
              evidence: ["C10"]
        - id: V3-E2
          type: experiment
          experiment: "u2900 worker campaign: warm SOAP sidecar, conditional radial guard, q/k Contra scale, LACV + q/k floor, schedule-phase retarget (keep PR #287 back-loaded cooldown)."
          outcome: "Converges on a sub-2950 statistically-viable distribution; hard schedule truncation fails (only phase-shift works)."
          support_level: explicit
          source_refs: ["v3/codex/scratchpad/THREAD.md:615-1146", "v3/codex/scratchpad/THREAD.md:1039"]
          evidence: ["C05", "C09", "C10"]
        - id: V3-E3
          type: experiment
          experiment: "W258 leave-one-out pruning (11 ablations) at the 2940/2949 boundary."
          outcome: "SOAP and radial are the largest keeps; nosphere (drop sphere-lookahead pull) is the only positive-score simplification; the two sphere removals do not compose. Submitted bin = 2949 (n=16)."
          support_level: explicit
          source_refs: ["v3/codex/scratchpad/THREAD.md:1168-1206", "v3/codex/scratchpad/w258_2940_leave_one_out_pruning_20260513.md:10-14", "record_configs/20260515_codex_v3_nosphere_2949/README.md:13-27"]
          evidence: ["C07", "C09", "C10", "C11"]
          children:
            - id: V3-DE3
              type: dead_end
              dead_end: "Combined sphere removal nosphere_notangent: loses the 2940 boundary (substitutes, not redundant)."
              support_level: explicit
              source_refs: ["v3/codex/scratchpad/THREAD.md:1206"]
              evidence: ["C11"]
        - id: V3-DE4
          type: dead_end
          dead_end: "Aurora lead abandoned at the public pivot: its adaptive-outlier-control tail never ported the 3027 win one step lower; survives only as the Contra residual."
          support_level: explicit
          source_refs: ["v3/codex/scratchpad/THREAD.md:411", "v3/codex/scratchpad/THREAD.md:190"]
