# Exploration Tree — ara (Codex track_3_optimization speedrun)
# Research DAG: nested tree with typed nodes (question | experiment | dead_end | decision | pivot).
#
# t=0 FRAME. Seeded ONLY with the open research questions from v1/codex/goal.md as root
# `question` nodes. No experiments, decisions, dead_ends, pivots, results, or answers exist
# yet — every one of those accretes later, turn by turn, through the time-ordered replay.
# The novelty wave will enter as an isolated `NV##` subtree during replay; nothing here yet.

tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions", "v1/codex/goal.md §Context"]
    title: "Which past-3-years optimizers beat Muon when properly tuned on this setup?"
    description: >
      Of the recent post-Muon optimizers (e.g. MuonClip, AdEMAMix, Adam-mini, Lion, Sophia,
      SOAP, Kron, Shampoo variants, sign-based methods, K-FAC / second-order methods,
      schedule-free methods, anything citing Muon since 2024), which — if any — reach 3.28 in
      fewer than Muon's 3500 steps on this exact frozen benchmark, once given a properly-tuned
      learning rate and schedule? (Open at t=0.)

  - id: N02
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions", "v1/codex/goal.md §Context"]
    title: "Do older (pre-2022) optimizers match/beat Muon when paired with a modern schedule?"
    description: >
      Are there older, under-benchmarked optimizers (e.g. Lookahead, RAdam, NovoGrad,
      LARS / LAMB, AdaBelief, AggMo, QH-Adam, Polyak averaging, gradient surgery,
      sharpness-aware variants, Adan) that match or beat Muon once paired with a modern
      schedule (WSD, etc.) on this setup? (Open at t=0.)

  - id: N03
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions"]
    title: "Is Muon's gain orthogonal to schedule / init / second-order / EMA gains — do they stack?"
    description: >
      Is the gain from Muon orthogonal to the gains from {schedule changes, init /
      parameterization changes, second-order preconditioners, EMA tricks}? Do those levers
      stack additively, or do they interfere? (Open at t=0.)

  - id: N04
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions"]
    title: "For a given optimizer, what is the actually-best schedule?"
    description: >
      Most papers under-tune the schedule. For a given optimizer on this setup, what is the
      actually-best schedule shape (warmup, decay, WSD vs cosine vs trapezoid vs multi-stage
      vs schedule-free, end-of-training averaging)? (Open at t=0.)

  - id: N05
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions"]
    title: "Is there a regime where an early-loss-curve loser wins on step-to-3.28?"
    description: >
      Is there a regime where an optimizer that loses on the loss curve early nonetheless
      reaches the 3.28 threshold in fewer steps — i.e. where the step_to_3.28 bin metric and
      the loss curve disagree? (Open at t=0.)

  - id: N06
    type: question
    support_level: explicit
    source_refs: ["v1/codex/goal.md §Questions", "v1/codex/AGENTS.md §Noise-floor gate"]
    title: "Where is the noise floor, and how many seeds make a 50/100/200-step gain significant?"
    description: >
      Where does the noise floor sit on this benchmark, and how many seeds does it take to
      declare a 50 / 100 / 200-step gain in step_to_3.28 statistically significant? Provisional
      t=0 estimates (step_to_target ≈ 50 steps; final_val_loss noise ≈ 0.001) must be
      re-measured from baseline-Muon at 3 seeds. (Open at t=0.)

