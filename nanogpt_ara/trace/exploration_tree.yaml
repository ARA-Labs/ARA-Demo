  - id: N11
    type: decision
    provenance: ai-executed
    timestamp: "2026-04-29T00:00"
    title: "Execution mode this window: exploit one corridor by hill-climbing the WSD horizon/early-stop boundary, gating each step on a 2-seed reproduction"
    choice: >
      Rather than first running the broad literature screen (Loop A), concentrate compute on the
      already-promising normuon (normalized-Muon) corridor and HILL-CLIMB the decoupled WSD
      horizon/early-stop boundary downward (3400 -> 3375 -> 3350 -> 3345 -> ... -> 3296), each
      new step recognized only after a 2nd-seed reproduction, with early mid-curve "gates" used to
      kill weak variants cheaply. Optimizer-family screens (Adam-mini, MARS, SOAP, Lookahead, etc.)
      are run as side probes against this corridor. Rationale stated by the agent: local records
      show the baseline is already close to target, heavy optimizer replacements have higher
      implementation risk and weaker local evidence, so the conservative ranking is schedule/LR
      first, then EMA/SWA/cautious, then optimizer replacements (NorMuon, MARS, SOAP/PSGD last).
    alternatives:
      - "Broad literature screen first (run the 2-Opus taxonomy picklist top-to-bottom before exploiting any corridor)"
      - "Replace the optimizer wholesale (SOAP/PSGD-Kron/Shampoo) before exhausting schedule/stop levers"
    evidence: ["N12", "N13", "N14", "N15"]
    status: open
    children:
      - id: N12
        type: experiment
        provenance: ai-executed
        timestamp: "2026-04-29T00:00"
        title: "normuon WSD horizon/stop boundary hill-climb — 2-seed reproduced frontier walks 3400 -> 3296 (bears on N01, N03, N04; resolves O01)"
