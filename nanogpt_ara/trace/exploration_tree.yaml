# Exploration Tree — Autonomous nano-GPT Optimizer Speedrunning
# Research DAG across waves: baseline -> v1 -> novelty -> v2 -> v3, plus the meta-investigation.
# Node types: question | experiment | dead_end | decision | pivot
# support_level: explicit (directly in INSIGHTS.md / runs.csv) | inferred (reconstructed logic)

tree:
  - id: N01
    type: question
    support_level: explicit
    source_refs: ["§0", "goal.md"]
    title: "How few training steps can reach val_loss 3.28 on GPT-124M?"
    description: >
      Minimize step_to_3_28 changing only optimizer/schedule/init/HPs; architecture, batch, and data
      fixed. Wall-clock is free. Reference points: AdamW 5625, Muon 3500, public record 3225.
    children:

      - id: N02
        type: experiment
        support_level: explicit
        source_refs: ["§0", "00001-muon-baseline"]
        title: "Establish the Muon reference recipe"
        result: "Two-optimizer baseline (AdamW + Muon, WSD schedule) reaches 3.28 at step 3500."
        evidence: ["§0"]
        children:

          - id: N03
            type: decision
            support_level: inferred
            title: "Stack many small levers vs hunt for a silver-bullet optimizer"
            choice: "Stack and re-tune many published levers onto the shared backbone."
            alternatives:
              - "Replace Muon with a single better optimizer (SOAP/Shampoo/Cautious/...)."
              - "Invent a novel operator."
            evidence: "Every single substitution moves the frontier <=1-2% (C01); the baseline is near a sharp optimum."
            children:

              - id: N04
                type: experiment
                support_level: explicit
                source_refs: ["§2", "§1", "cc_v1/ideas.md"]
                title: "v1 lever ladder: integrate MuonEq, train-steps trim, attn-LR, embed-init, mu-sched"
                result: "Claude reaches 3000, Codex 3150; MuonEq is the strongest single lever (dval -0.00484)."
                evidence: [C01, C03, C04]
                children:

                  - id: N05
                    type: dead_end
                    support_level: explicit
                    source_refs: ["§2.D.1", "00182-soap-lr3e-2"]
                    title: "Full-model SOAP on top of Muon"
                    hypothesis: "A second-order preconditioner adds curvature signal Muon lacks."
                    failure_mode: "Asymptotes ~3.39, never reaches 3.28; duplicates Muon's NS curvature work globally."
                    lesson: "NS already captures curvature at 124M; global SOAP is cost without signal. Revisited as a SUBSET lever in v3 (N14)."

                  - id: N06
                    type: dead_end
                    support_level: explicit
                    source_refs: ["§2.D.2", "§6.4", "arXiv:2411.16085"]
                    title: "Cautious-Muon (sign-agreement masking)"
                    hypothesis: "Masking updates that disagree with the fresh gradient enforces monotone descent."
                    failure_mode: "Both agents regress/diverge (codex ends 3.30833); masking destroys NS orthogonality."
                    lesson: "Muon already gives implicit monotone descent; the mask only removes useful signal. Most robust cross-agent clean negative."

                  - id: N07
                    type: dead_end
                    support_level: explicit
                    source_refs: ["§2.D.2", "§2.D.3", "family=muon2f"]
                    title: "Lookahead / AdEMAMix / Muon^2 as Muon add-ons"
                    hypothesis: "Better averaging / 2nd-moment preconditioning improves Muon (Muon^2 showed -175 vs vanilla)."
                    failure_mode: "Slow components under-converge in <3200 steps; Muon^2 regresses in-stack (best 3190)."
                    lesson: "A lever's sign depends on the backbone — PR gains vs vanilla Muon do not transfer additively (C05)."

      - id: N08
        type: pivot
        support_level: explicit
        source_refs: ["§4", "§10", "cc_novelty"]
        title: "Novelty-constrained wave"
        from: "Tune/stack known-good levers"
        to: "Invent only genuinely-novel operators (ban known methods + HP tweaks)"
        trigger: "A deliverable constraint requiring novel ideas, not re-tuning."
        children:

          - id: N09
            type: dead_end
            support_level: explicit
            source_refs: ["§10.1", "§10.2", "cc_novelty"]
            title: "Novel operators (trust-region-muon, spectral-momentum, aniso-kron)"
            hypothesis: "A new operator can beat carefully-tuned Muon."
            failure_mode: "Best novel op merely matches re-validated plain Muon (3375); SPM with shallow NS drifts to 3.71@2000."
            lesson: "Operators touching the NS core degrade orthogonalization; on a saturated target novel != better (C10)."

          - id: N10
            type: dead_end
            support_level: explicit
            source_refs: ["§10.3", "scaphd-v1"]
            title: "softcap-head-lr controller (scaphd-v1)"
            hypothesis: "An embed/head LR controller orthogonal to Muon could help."
            failure_mode: "Cancelled mid-run (step 2750) for attaching a forward hook in the Setup section (code-location rule)."
            lesson: "Code LOCATION matters as much as semantic effect; an infrastructure rule depressed the novelty frontier."

      - id: N11
        type: decision
        support_level: explicit
        source_refs: ["§13", "03141-v12-baseline"]
        title: "Freeze the v1 frontier as the v12 backbone and sweep around it"
        choice: "Hardcode every v1 winning lever into 'v12', then run v2/v3 sweeps around a fixed point."
        alternatives:
          - "Keep exploring operators from scratch each wave."
        evidence: "v12 = MuonEq + ts3025 + embed*0.7 + per-role LR + mu-sched, baked in (§13.1)."
        children:

          - id: N12
            type: experiment
            support_level: explicit
            source_refs: ["§13.3", "rolewd-combo", "§13.2"]
            title: "v2: per-role weight decay + LR pushed to 0.045"
            result: "Codex best ~2962; role-WD (attn 0.0275 < MLP 0.03125); v2 is cheaper per step than baseline."
            evidence: [C04, C06]
            children:

              - id: N13
                type: experiment
                support_level: explicit
                source_refs: ["§5", "§16", "07070-v88-aurora-proj"]
                title: "v3: stack SOAP-on-subset + Aurora + Contra-Muon + power-law cooldown"
                result: "Both agents reach ~2880-2885 single-best-seed; LR re-tuned down to 0.0375."
                evidence: [C04, C08, C14]
                also_depends_on: [N05]
                children:

                  - id: N14
                    type: decision
                    support_level: explicit
                    source_refs: ["§5.3", "§16.2", "SOAP_PARAM_MODE=mlp_plus_v"]
                    title: "Restrict SOAP to MLP + value-projection (not full, not Q/K)"
                    choice: "Apply SOAP only where curvature is anisotropic/persistent (MLP, V), gated by trust_gate."
                    alternatives:
                      - "Full-model SOAP (failed, N05)."
                      - "No SOAP (loses ~+85 steps)."
                    evidence: "Same operator, opposite sign by parameter subset (C05); biggest hitting v3 lever (C13)."

                  - id: N15
                    type: experiment
                    support_level: explicit
                    source_refs: ["§14", "loo01..15"]
                    title: "Leave-one-out ablation (4 seeds) ranking every component"
                    result: "Long-tailed: pow_cooldown critical, soap_mlp ~+85, adamw_betas ~+45, normuon ~0."
                    evidence: [C01, C03, C06, C13]
                    children:

                      - id: N16
                        type: dead_end
                        support_level: explicit
                        source_refs: ["§14.1", "§15", "loo15_no_pow_cooldown"]
                        title: "Remove the power-law cooldown"
                        hypothesis: "Schedule shape was ~neutral at the baseline, so it should be droppable."
                        failure_mode: "All 4 seeds MISS 3.28 — at the frontier the convex cooldown is load-bearing (sub-0.001 margin)."
                        lesson: "A lever's importance grows as the rest of the recipe saturates (higher-order backbone-dependence)."

                      - id: N17
                        type: dead_end
                        support_level: explicit
                        source_refs: ["§14.4", "loo14_no_normuon"]
                        title: "NorMuon at the frontier"
                        hypothesis: "Post-NS row-norm should still add value."
                        failure_mode: "LOO ~0 (2930 = full recipe): redundant once Aurora/MuonEq row-normalize."
                        lesson: "A frontier recipe carries dead weight; redundant levers are not always pruned."

  - id: N18
    type: experiment
    support_level: explicit
    source_refs: ["§9", "§21", "seed_reverify"]
    title: "Seed-reverify wave: noise floor and miss-rate (13 groups, 152 runs)"
    also_depends_on: [N04, N13]
    result: "final-val std ~0.0009-0.0011; ~9% pooled miss; frontier step-std ~14-21; seeds ~8*sigma^2/Delta^2."
    evidence: [C09, C17]
    children:

      - id: N19
        type: decision
        support_level: explicit
        source_refs: ["§9.2", "§20.4", "README"]
        title: "Report seed-verified medians + miss-rate, not best-of-N"
        choice: "Headline the seed-verified figure (cc 2930) and the miss-rate, not the lucky 2885."
        alternatives:
          - "Report single-best-seed records (overstates by ~30-50 steps)."
        evidence: "~9-12% of frontier seeds miss; std ~ single-lever size (C09)."

  - id: N20
    type: experiment
    support_level: explicit
    source_refs: ["§18", "07070-v88-aurora-proj", "codex worker27"]
    title: "Cross-agent v3 recipe diff"
    also_depends_on: [N13]
    result: "Records are byte-identical except tiny timing offsets (same trust_gate, SOFT_MUON_P=0.1, ...)."
    evidence: [C15]
    children:

      - id: N21
        type: pivot
        support_level: explicit
        source_refs: ["§5.5", "§18", "§19"]
        title: "Correct the 'independent convergence' reading"
        from: "v3 identity = independent rediscovery of real structure"
        to: "v3 identity = shared public-PR lineage; the real independent signal is the v1 divergence"
        trigger: "Byte-identical v3 records cannot be independent invention."
        children:

          - id: N22
            type: experiment
            support_level: explicit
            source_refs: ["§19", "§12", "launched_at order"]
            title: "v1 divergence deep-dive (first ~120 launch-ordered runs per agent)"
            result: "cc breadth-first (~14 families -> MuonEq -> 3000); codex depth-first (106-run NorMuon sweep -> 3150)."
            evidence: [C12, C15]
