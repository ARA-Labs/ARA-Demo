      - id: N15
        type: dead_end
        provenance: ai-executed
        timestamp: "2026-04-29T00:00"
        title: "Broad optimizer-replacement washout: ~20 post-Muon / older-optimizer families fail to beat the NorMuon WSD-boundary corridor (bears on N01, N02)"
        hypothesis: >
          That some recent post-Muon optimizer or under-benchmarked older optimizer, dropped into
          this frozen setup with a reasonable LR/schedule, would beat the NorMuon horizon/stop
          corridor on step_to_3.28.
        failure_mode: >
          Each was screened (often as a clean single-seed go/no-go against the corridor's early
          mid-curve gates) and either failed early or finished above target. Closed this window
          with the agent's stated reasons: Cautious-Muon/NorMuon (hard miss 3.30833; cautious
          variants diverge early 4.33792), EMA (3.279xx @3500, never beats step count), MARS-M
          gamma .005/.01/.025 (close but worse / behind), FWA (3.28363), SOAP/Shampoo (6.15632
          early), TEON-QKV k2 mode1 (no mid-curve advantage), Lookahead-matrix (tail-fails,
          3.29692), schedule-free NorMuon (3.41080), APOLLO hidden/MLP/both (3.290xx), RAdamW
          (3.93168), AdaBelief (3.28677), NaMO-D (3.29029), CAME (early lag), Adan/AdanW (early
          gate fail, higher overhead), QHAdamW (timeout/no signal), LAMB (mid-curve behind),
          Sophia-F matrix (early kill 3.99779), MVR-NorMuon / NovoGrad / SM3 / MADGRAD / Yogi /
          subspace-momentum / SCALE colnorm / Adam-grafted NorMuon / Muon2-F / row-post norm /
          CANS-NorMuon / column-preconditioned NorMuon / input-diagonal (all behind or pathological).
          Adam-mini optimizer1 is the ONE non-NorMuon optimizer signal that survived (see N13), but
          it does not produce a seed-stable lower frontier either.
        lesson: >
          On this exact frozen benchmark, wholesale optimizer replacement (both the recent post-Muon
          wave and older under-benchmarked methods) does NOT beat the NorMuon + decoupled-WSD-boundary
          corridor; the productive levers remain inside that corridor (schedule horizon/stop, beta
          warm-down, late beta2 thaw, mlp-proj LR split). These are clean NEGATIVE results — exactly
          the verification contribution flagged in problem.md O3/G1/G2. The contradictory point —
          most heavy replacements lose EARLY on the loss curve and still never cross sooner — is
          evidence on N05 (bin-vs-loss-curve) too. Note: most are single-seed screens, so each is a
          screened-out negative, not a 2-seed-certified refutation of the underlying method.
        status: resolved
  - id: N16
    type: decision
    provenance: user
    timestamp: "2026-04-29T00:00"
    title: "User mid-turn constraint refresh: stricter architecture boundary, stretch target < 2800 steps, Slurm preempt ownership policy"
    choice: >
      The user clarified, mid-window, three binding constraints that narrow the search and the
      operating environment: (1) the architecture boundary is STRICTER than the docs' broad scope —
      do not modify GPT.forward, logits, loss/objective, data, batch/microbatch, train/eval
      semantics, or model architecture; ONLY optimizer / schedule / optimizer-state / run-control
      are valid (the agent thereafter verifies "GPT_class_identical=True" and an empty GPT.forward
      diff before each launch); (2) formal best recognition requires two seeds PLUS the noise-floor
      gate (re-affirming the lawful core); (3) the stretch target is BELOW 2800 steps — the
      3290-range polishing is useful for rigor/mechanism understanding but "not strategically
      enough," prompting a high-ambition optimizer-family sidecar; and a Slurm policy: preempt jobs
      with a 'claude-code' prefix belong to a DIFFERENT independent agent and must not be touched —
      Codex jobs must use a 'codex-' job-name prefix.
    alternatives:
      - "Keep the docs' broad 'Optimization + Init & Optim Hyperparams' scope (would have allowed init-scaling / borderline changes the user now excludes)"
      - "Treat the 3290-range frontier as the goal (the user explicitly redirects ambition to <2800)"
    evidence: []
    status: open

