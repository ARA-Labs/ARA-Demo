# Exploration tree — NOVELTY LANE (isolated sub-namespace inside the single ara/)
# wave: novelty | isolation: hard. Node ids are NV##. NO also_depends_on edges into the
# v1/v2/v3 lineage. Cross-linked into the lineage only later, at the seal step.
tree:
  - id: NV01
    type: question
    title: "Novelty wave opened — beat Muon@3500 with at least one non-arXiv idea"
    provenance: user
    timestamp: "2025-01-01T00:00"
    wave: novelty
    isolation: hard
    description: >
      Mission-start handoff (synthetic novelty-000). Open the novelty wave: same frozen
      benchmark and compute as the contemporaneous v1 wave, hard-isolated from it (the rules
      forbid looking at any other worktree, including v1). Floor to beat: Muon @ 3500 steps
      (AdamW baseline @ 5625). best_legitimately_known start_bin at wave start = 3500.
      The defining EXTRA constraint vs v1: every submitted recipe must contain at least one
      idea NOT published on arXiv (the "novelty bar"); published optimizers/schedules/inits
      are inspiration only, and porting one + tuning its HPs FAILS the mission. Every
      submitted idea must pass an arXiv novelty check (a subagent search, retained as
      evidence) BEFORE runtime. A clean negative result on the agent's own derivation — with
      the math reason it did not beat Muon — is itself counted as a real contribution.
      Full mission rules: novelty/codex/goal.md and novelty/codex/AGENTS.md (any achieved
      frontier / "current best" row below 3500 in goal.md is hindsight and is NOT known now).
    evidence:
      - "turns/sealed/novelty/000_mission-start/packet.md (synthetic wave-start handoff)"
      - "novelty/codex/goal.md (mission statement; ignore sub-3500 frontier rows — hindsight)"
      - "novelty/codex/AGENTS.md (binding rules & budget)"
    status: open
    children: []

  # ---- turn novelty-002 (2026-05-03): first autonomous run-bearing novelty turn ----
  # ~40 dual-gated novel ideas, 254 runs; every idea closed NEGATIVE under the 2-seed /
  # noise-floor gate. Best single-seed step_to_3.28 this window = 3375 (ngi001_n0875_m1125_t3450),
  # which FAILED its 2-seed reproduction. wave: novelty | isolation: hard throughout.

  - id: NV02
    type: decision
    title: "Adopt a TWO-GATE pre-submission protocol: rule/architecture check + arXiv novelty check before any code"
    provenance: user
    timestamp: "2026-05-03T03:00"
    wave: novelty
    isolation: hard
    choice: >
      Every new generated idea must pass a dedicated benchmark-rule/architecture-compliance
      subagent AND an arXiv novelty-existence subagent BEFORE any optimizer code is written.
      The compliance check must confirm the idea stays within optimizer/init/LR/WD-schedule
      surfaces and does NOT alter architecture, data, batch, sequence length, validation, or
      one-forward-backward semantics. Triggered by the user clarifying that softcap/logit-cap
      changes are architecture changes and therefore out of scope.
    alternatives:
      - "arXiv novelty check only (the prior single-gate process from the wave opening, OV02)"
      - "no pre-code gate; check compliance/novelty post-hoc"
    evidence:
      - "THREAD: 'softcap/logit-cap changes are architecture changes and therefore out. New standing rule: every new generated idea needs a dedicated benchmark-rule compliance subagent before code, in addition to the arXiv novelty check.'"
      - "novelty/codex/scratchpad/rule_checks/current_batch_rule_audit.md (retrospective audit: PASS for the already-launched batch)"
      - "OV01, OV02 (the prior novelty bar + arXiv-check constraints this extends)"
    status: resolved
    children: []

  - id: NV03
    type: experiment
    title: "First-batch mechanism families TRM / STM / ALR (residual-reinjection, eta-coupled memory, alignment thermostat)"
    provenance: ai-executed
    timestamp: "2026-05-03T00:25"
    wave: novelty
    isolation: hard
    result: >
      All three first-batch families passed the arXiv existence check (novel-enough) and ran,
      but produced no progress vs Muon@3500. ALR neutral at best (k025 final 3.27673 / k050
      3.27885, both first target only at 3500 = baseline tie/worse). STM worsened late loss
      (rho03 3.27680, rho05 3.28121, rho07 3.28741). TRM positive-alpha ruled down
      (alpha005 3.28374, alpha010 cancelled, alpha020 3.30633); sign-flipped alpham005 close
      at 3.27722 but first target only at 3500. No reproduction trigger from any of the three.
    evidence:
      - "runs.jsonl rows alr001_k025/k050, stm001_rho03/rho05/rho07, trm001_alpha005/alpha010/alpha020/alpham005 (preempt jobs 8709-8717, 8731)"
      - "novelty/codex/scratchpad/variants/{trm001_alpha005.py,stm001_rho05.py,alr001_k025.py,...}"
    status: resolved
    children: []

  - id: NV04
    type: experiment
    title: "Init-only branch-gain / hidden-basis rescale family (RSI, VFG, NGI, SVC, QKP, PMI, HFS, CGI, CSI)"
    provenance: ai-executed
    timestamp: "2026-05-03T01:47"
    wave: novelty
    isolation: hard
    result: >
      The strongest-surviving direction this window: init-only rescales of existing
      branch-input weights (attn.v / mlp.fc), block RMSNorm gains, and q/k weights, with
      proj zero-init preserved. Many cells PRESERVE the early-training loss edge through
      mid-run but do NOT improve the step_to_3.28 crossing at full 3500. Best finals near
      baseline (RSI gain090 3.27630, NGI n095m105 3.27696, VFG gain080 3.27704). Target-step
      probes pushed crossings to 3475/3450 single-seed only. No init-family cell cleared the
      2-seed / noise-floor gate.
    evidence:
      - "runs.jsonl rows rsi001_*, vfg001_*, ngi001_*, svc001_*, qkp001_*, pmi001_*, hfs001_*, cgi001_*, csi001_* (preempt jobs 8768-9027, selected)"
      - "novelty/codex/scratchpad/ideas/{vng001_value_norm_coupled_init.md,cgi001_complementary_channel_gain_init.md,csi001_complementary_source_weight_column_init.md}"
    status: resolved
    children: []

  - id: NV05
    type: pivot
    title: "Novelty bar tightened to NON-ADDITIVE optimizer-level interaction only"
    provenance: user
    timestamp: "2026-05-03T02:30"
    wave: novelty
    isolation: hard
    from: "Novelty = >=1 non-arXiv idea per submission (OV01), allowing schedule-driven and optimizer+schedule combinations"
    to: >
      optimizer+schedule and schedule-only combinations do NOT count as novel even if the
      schedule is signal-driven; optimizer-level combinations count ONLY when one optimizer
      mechanism's OUTPUT materially shapes another mechanism's behavior — and (tightened
      again later this turn) only when that interaction is materially NON-ADDITIVE.
      optimizer+schedule remains non-novel plumbing.
    trigger: >
      User refined the novelty bar mid-wave. Immediate effect: alr001, stm001, cdm001, dsl001,
      mhs001, wdi001, zpb001, wdr001, rzb001 became NOT promotion-eligible; active
      scheduler/plumbing jobs 8770 (ZPB), 8771 (WDR), 8775 (RZB) were cancelled. Init-only RSI
      and VFG cells were kept (init is a separate surface, unaffected).
    evidence:
      - "THREAD: 'optimizer+schedule and schedule-only combinations do not count as novel, even if the schedule is signal-driven. Optimizer-level combinations can count only when one optimizer mechanism's output materially shapes another mechanism's behavior.'"
      - "THREAD: 'optimizer-level combinations are allowed only when the interaction is materially non-additive; optimizer+schedule remains non-novel plumbing.'"
    status: resolved
    children: []

  - id: NV06
    type: dead_end
    title: "Schedule-driven / optimizer+schedule mechanisms ruled NON-NOVEL (cooldown/momentum/WD schedule family)"
    provenance: ai-suggested
    timestamp: "2026-05-03T02:30"
    wave: novelty
    isolation: hard
    hypothesis: >
      A signal-driven schedule lever (desynchronized cooldown, momentum-horizon stretch,
      WD-impulse/release schedule, zero-proj LR bridge, cooldown de-Nesterov, residual-zero
      bridge burst) could be a promotable novel mechanism.
    failure_mode: >
      Killed by the refined novelty bar (NV05), not by a run: ALR, STM, CDM, DSL, MHS, WDI,
      ZPB, WDR, RZB are optimizer+schedule or schedule-only and therefore non-novel plumbing
      regardless of any loss curve. Several had already also closed empirically negative
      (CDM rho05/rho07 3.29198/3.29715; DSL/MHS/WDI cancelled as dominated).
    lesson: >
      Under this lane's bar, a schedule actuator is never the novel unit. Spend the novelty
      budget on optimizer-internal mechanism interactions and init geometry, not on shaping
      LR/WD/momentum schedules from a signal.
    status: resolved
    children: []

  - id: NV07
    type: dead_end
    title: "Large class of optimizer-internal ideas killed PRE-CODE by the arXiv novelty gate (reduce to known priors)"
    provenance: ai-suggested
    timestamp: "2026-05-03T04:00"
    wave: novelty
    isolation: hard
    hypothesis: >
      Various Muon-internal preconditioners / projections looked novel: tangent-gradient
      (TGM), row/col-equilibrated (RCM/PRC/POC), gradient-centered (GCM), spectral-energy
      clipped (SEC), depth-graded init (DGB), and many transport/commutator/skew variants.
    failure_mode: >
      The arXiv existence subagent returned not-novel: each reduced to a published prior —
      OrthoGrad/perpGrad/Mano (tangent projection), MuonEq/Muon^2/Mousse (row-column adaptive
      Muon), Gradient Centralization (GCM), low-rank orthogonalization / Dion / SUMO / LiMuon /
      POME / GaLore / AdaRankGrad (SEC), DS-Init/Fixup/T-Fixup/DeepNet/DeepNorm (DGB),
      Cayley/Stiefel skew transport (SSG/GRC/SDF), error-feedback SGD (EFO), etc.
    lesson: >
      Most "obvious" Muon-internal preconditioning ideas are already published. The novelty
      gate is the binding filter long before the benchmark is; a math-grounded kill note (the
      reduction to the prior) is itself the recorded contribution for these ideas.
    status: resolved
    children: []

  - id: NV08
    type: dead_end
    title: "Optimizer-level ideas killed PRE-CODE by the refined NON-ADDITIVE gate (additive / no-op / source-swap)"
    provenance: ai-suggested
    timestamp: "2026-05-03T08:00"
    wave: novelty
    isolation: hard
    hypothesis: >
      Combinations that couple two optimizer signals (gain-delta x stretch, bias-delta x Gram,
      stretch-commutator, block-Lanczos transport, innovation-tangent, dual-polynomial NS,
      stateful product-frame, etc.) could be materially non-additive novel mechanisms.
    failure_mode: >
      Killed by the refined-rule gate (NV05) on algebra: many collapse to a scalar
      Nesterov/de-Nesterov blend (ITP001, PJD001, BPD001), to an EXACT-polar no-op
      (GLC001, NMA001, DPF001, CPD001: offdiag of a diagonal or U^T U = I gives 0), or to a
      source/target/formula swap over an already-occupied actuator (SCE/RCG/BLT/BDE/SPF/WSE/
      QAP/RPS/MCM/DGS/BRP/PCG/...). Several passed the arXiv gate yet still failed the binding
      refined-rule gate (e.g. BPD001 novel-enough but non-additive failure is binding).
    lesson: >
      The refined non-additive bar (NV05) does most of the killing once arXiv-obvious priors
      are exhausted: a coupling that reduces to a scalar blend, an exact-polar identity, or a
      re-pointed actuator is not a new mechanism. Check the algebra (does the tensor vanish for
      exact polar? does it reduce to (1-c)N + cD?) BEFORE coding.
    status: resolved
    children: []

