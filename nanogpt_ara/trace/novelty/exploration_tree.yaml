  - id: NV12
    type: dead_end
    title: "run_variant_once.sh wrapper bug: completed runs reported FAILED (pipeline status capture)"
    provenance: ai-executed
    timestamp: "2026-05-03T01:30"
    wave: novelty
    isolation: hard
    hypothesis: >
      Slurm jobs that printed full final validation lines but showed status FAILED indicated
      the training itself failed.
    failure_mode: >
      Tooling bug, not a training failure: old run_variant_once.sh line 15 failed AFTER
      training completed (the pipeline status capture). Several jobs showed FAILED despite a
      complete run. Patched the helper to split status capture into set +e / PIPESTATUS /
      set -e and manually harvested completed internal logs into ai/scratchpad/runs/*.log and
      runs.jsonl. (Also patched future launches with PYTHONUNBUFFERED=1 so consoles expose
      validation progress before process exit; later launch bugs ZPB/PPM/RPT/SAM/ADV — param-group
      vs raw-list Muon ctor, mixed bf16/fp32 lerp, stale train_steps=3500 — were one-off fixes.)
    lesson: >
      Trust the harvested final validation line, not the Slurm exit status, when the wrapper's
      post-training status capture is buggy. Separate run-control bugs from optimizer evidence.
    status: resolved
    children: []
